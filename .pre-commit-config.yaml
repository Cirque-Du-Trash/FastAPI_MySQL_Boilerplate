repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--profile", "black", "--src", "app"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd app && poetry run pytest'
        language: system
        pass_filenames: false
        always_run: true